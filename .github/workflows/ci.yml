name: Project TakoHalo CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  # 1. LUỒNG KIỂM TRA FRONTEND
  frontend-ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Frontend dependencies
        working-directory: ./frontend
        run: npm install

      - name: Build Frontend
        working-directory: ./frontend
        run: npm run build

  # 2. LUỒNG KIỂM TRA BACKEND
  backend-ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Backend dependencies
        working-directory: ./backend
        run: npm install

      # Đã bỏ lệnh npm test cũ vì lệnh đó của bạn đang cố tình ném ra lỗi (exit 1)
      - name: Verify Backend Start Syntax
        working-directory: ./backend
        run: node --check src/server.js