name: Project TakoHalo CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  # 1. JOB KIỂM TRA FRONTEND
  frontend-ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: './frontend/package-lock.json' # Chỉ định đúng file lock của FE

      - name: Install Frontend dependencies
        working-directory: ./frontend # 💡 Di chuyển vào thư mục frontend
        run: npm ci

      - name: Check TypeScript Compilation
        working-directory: ./frontend
        run: npm run build-compile --if-present || npx tsc --noEmit

      - name: Build Frontend
        working-directory: ./frontend
        run: npm run build

  # 2. JOB KIỂM TRA BACKEND (Ví dụ NodeJS/Express)
  backend-ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: './backend/package-lock.json' # Chỉ định đúng file lock của BE

      - name: Install Backend dependencies
        working-directory: ./backend # 💡 Di chuyển vào thư mục backend
        run: npm ci --once || npm install # Chạy install tùy thuộc vào cấu trúc BE của bạn

      - name: Check Backend TypeScript
        working-directory: ./backend
        run: npx tsc --noEmit

      - name: Test Backend
        working-directory: ./backend
        run: npm test --if-present # Tự động chạy test nếu backend có viết test script